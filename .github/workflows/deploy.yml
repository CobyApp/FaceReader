name: Deploy to TestFlight

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Optional build number override (defaults to GitHub run number)'
        required: false

concurrency:
  group: appstore-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: macos-latest
    timeout-minutes: 60

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Ruby + Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Tuist via mise
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"
          "$HOME/.local/bin/mise" install
          "$HOME/.local/bin/mise" exec -- tuist version

      - name: Cache Tuist build
        uses: actions/cache@v4
        with:
          path: Tuist/.build
          key: tuist-${{ runner.os }}-${{ hashFiles('Tuist/Package.resolved', 'Tuist/Package.swift') }}
          restore-keys: |
            tuist-${{ runner.os }}-

      - name: Install Distribution certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:codesign -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | xargs)

      - name: Stage App Store Connect API key
        env:
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
        run: |
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          echo "$APPSTORE_PRIVATE_KEY" > "$KEY_DIR/AuthKey_${APPSTORE_KEY_ID}.p8"
          echo "AUTH_KEY_PATH=$KEY_DIR/AuthKey_${APPSTORE_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Compute build number
        run: |
          if [ -n "${{ github.event.inputs.build_number }}" ]; then
            echo "BUILD_NUMBER=${{ github.event.inputs.build_number }}" >> "$GITHUB_ENV"
          else
            echo "BUILD_NUMBER=${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      - name: Diagnose signing/API key setup
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          echo "::group::Xcode"
          xcode-select -p
          xcodebuild -version
          echo "::endgroup::"

          echo "::group::Available signing identities"
          security find-identity -v -p codesigning || true
          echo "::endgroup::"

          echo "::group::Certificate details"
          security find-certificate -a -p "$RUNNER_TEMP/app.keychain-db" \
            | openssl x509 -noout -subject -issuer -dates 2>/dev/null || true
          echo "::endgroup::"

          echo "::group::API key file sanity"
          KEY_FILE="$AUTH_KEY_PATH"
          echo "Path: $KEY_FILE"
          echo "Size: $(wc -c < "$KEY_FILE") bytes"
          # only print the first/last line — never the key body
          head -1 "$KEY_FILE"
          tail -1 "$KEY_FILE"
          if grep -q "BEGIN PRIVATE KEY" "$KEY_FILE" && grep -q "END PRIVATE KEY" "$KEY_FILE"; then
            echo "✓ PEM markers present"
          else
            echo "✗ MISSING PEM markers — secret newlines likely lost"
            exit 1
          fi
          echo "::endgroup::"

          echo "::group::Env (lengths only, never values)"
          echo "APPSTORE_KEY_ID length: ${#APPSTORE_KEY_ID}"
          echo "APPSTORE_ISSUER_ID length: ${#APPSTORE_ISSUER_ID}"
          echo "::endgroup::"

      - name: Deploy to TestFlight
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: bundle exec fastlane beta

      - name: Dump xcodebuild log on failure
        if: failure()
        run: |
          echo "::group::xcodebuild logs in $RUNNER_TEMP"
          ls -la "$RUNNER_TEMP" || true
          echo "::endgroup::"
          for f in "$RUNNER_TEMP"/*.log; do
            [ -f "$f" ] || continue
            echo "::group::tail -200 $f"
            tail -n 200 "$f" || true
            echo "::endgroup::"
            echo "::group::grep 'error:|warning:|FAILED' $f"
            grep -nE "error:|warning:|FAILED|\\*\\* (ARCHIVE|BUILD) FAILED \\*\\*" "$f" | tail -n 80 || true
            echo "::endgroup::"
          done

      - name: Upload gym/xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ${{ runner.temp }}/*.log
            ${{ runner.temp }}/gym
            /Users/runner/Library/Logs/gym
          if-no-files-found: ignore
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app.keychain-db" || true
          rm -f "$AUTH_KEY_PATH" || true
